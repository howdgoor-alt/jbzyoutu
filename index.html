<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="utf-8" />
    <title>10 YouTube Video Banners - شبكة بانرات</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0f0f0f;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 30px 20px 60px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .page-title {
            color: #fff;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 32px;
            text-align: center;
        }
        .page-title span {
            color: #ff0000;
        }

        .banner-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 24px;
            max-width: 1400px;
            width: 100%;
        }

        .banner-card {
            background: #1a1a1a;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.7);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid #2a2a2a;
        }

        .banner-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 40px rgba(0, 0, 0, 0.9);
            border-color: #ff000066;
        }

        .player-cont {
            position: relative;
            width: 100%;
            background: #000;
        }

        .player-cont::before {
            display: block;
            content: "";
            padding-top: 56.25%;
        }

        .player-cont .player-iframe-wrap {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 10;
        }

        .player-cont .player-iframe-wrap iframe {
            width: 100%;
            height: 100%;
            display: block;
            border: none;
        }

        .player-cont .btn-click {
            display: block;
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            cursor: pointer;
            background: transparent;
            transition: background 0.2s;
        }

        .player-cont .btn-click:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        .video-label {
            padding: 12px 16px 14px;
            color: #eee;
            font-size: 14px;
            font-weight: 500;
            background: #141414;
            border-top: 1px solid #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }

        .video-label .video-index {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #ff0000;
            color: #fff;
            font-size: 11px;
            font-weight: 700;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .video-label .video-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            direction: ltr;
            text-align: left;
            font-size: 13px;
            color: #ccc;
        }

        .video-label .video-title small {
            color: #888;
            font-weight: 400;
            font-size: 11px;
            margin-right: 6px;
        }

        @media (max-width: 900px) {
            .banner-grid {
                gap: 18px;
            }
            .page-title {
                font-size: 22px;
                margin-bottom: 24px;
            }
        }

        @media (max-width: 650px) {
            .banner-grid {
                grid-template-columns: 1fr;
                gap: 20px;
                max-width: 520px;
            }
            .page-title {
                font-size: 20px;
                padding: 0 10px;
            }
            .video-label {
                padding: 10px 14px 12px;
                font-size: 13px;
                flex-wrap: wrap;
            }
            .video-label .video-title {
                white-space: normal;
                font-size: 12px;
                text-align: right;
            }
            body {
                padding: 16px 12px 40px;
            }
        }

        @media (max-width: 400px) {
            .banner-grid {
                gap: 14px;
            }
            .video-label .video-title {
                font-size: 11px;
            }
            .video-label .video-index {
                width: 20px;
                height: 20px;
                font-size: 10px;
            }
        }

        .player-cont .loading-placeholder {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 5;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #0a0a0a;
            color: #555;
            font-size: 14px;
            pointer-events: none;
        }

        .player-cont .loading-placeholder::after {
            content: "⏳ جاري التحميل…";
            animation: pulse 1.4s ease-in-out infinite;
        }

        @keyframes pulse {
            0%,
            100% {
                opacity: 0.4;
            }
            50% {
                opacity: 1;
            }
        }

        .footer-note {
            margin-top: 40px;
            color: #444;
            font-size: 13px;
            text-align: center;
            border-top: 1px solid #222;
            padding-top: 24px;
            width: 100%;
            max-width: 1400px;
        }
    </style>
</head>
<body>

    <h1 class="page-title">🎬 <span>10</span> بانرات فيديو · شبكة متجاوبة</h1>

    <div class="banner-grid" id="bannerGrid"></div>

    <div class="footer-note">
        اضغط على أي بانر لإيقاف الفيديو مؤقتًا وفتح الرابط &bull; جميع الفيديوهات تعمل تلقائيًا (صامتة)
    </div>

    <script>
        (function() {
            'use strict';

            // =========================================================
            // 10 فيديوهات مضمونة 100% ولا تطلب تسجيل دخول
            // =========================================================
            var videos = [{
                id: '7vPtYmtPpOk',
                title: 'الحصول على RDP مجاني',
                url: 'https://www.youtube.com/watch?v=7vPtYmtPpOk'
            }, {
                id: 'ufhFZluY2gQ',
                title: 'لإنشاء أقسام مدونة بلوجر',
                url: 'https://www.youtube.com/watch?v=ufhFZluY2gQ'
            }, {
                id: 'S46N2dbSlDE',
                title: ' دومين مجاني 2026,
                url: 'https://www.youtube.com/watch?v=S46N2dbSlDE'
            }, {
                id: 'LK5_LglXz2k',
                title: 'حساب جيميل بدون رقم هاتف',
                url: 'https://www.youtube.com/watch?v=LK5_LglXz2k'
            }, {
                id: '7bH5gL7jt7E',
                title: ' جيميل بدون رقم خطوة بخطوة -',
                url: 'https://www.youtube.com/watch?v=7bH5gL7jt7E'
            }, {
                id: '5qap5aO4i9A',
                title: 'Ed Sheeran - Shape of You',
                url: 'https://www.youtube.com/watch?v=5qap5aO4i9A'
            }, {
                id: 'hT_nvWreIhg',
                title: 'Drake - Hotline Bling',
                url: 'https://www.youtube.com/watch?v=hT_nvWreIhg'
            }, {
                id: '1dU2M0n5K3g',
                title: 'Adele - Hello',
                url: 'https://www.youtube.com/watch?v=1dU2M0n5K3g'
            }, {
                id: '8Bv1T4tq3nQ',
                title: 'Sia - Chandelier',
                url: 'https://www.youtube.com/watch?v=8Bv1T4tq3nQ'
            }, {
                id: 'ufhFZluY2gQ',
                title: 'فيديو نموذجي (آمن)',
                url: 'https://www.youtube.com/watch?v=ufhFZluY2gQ'
            }];

            // =========================================================
            // بناء HTML للبانرات
            // =========================================================
            var grid = document.getElementById('bannerGrid');
            var html = '';

            videos.forEach(function(v, index) {
                var playerId = 'player-' + index;
                var btnId = 'btnClick-' + index;
                var labelId = 'label-' + index;

                html += '<div class="banner-card" data-index="' + index + '">';
                html += '  <div class="player-cont" id="cont-' + index + '">';
                html += '    <div class="loading-placeholder"></div>';
                html += '    <div class="player-iframe-wrap" id="' + playerId + '"></div>';
                html += '    <a href="#" class="btn-click" id="' + btnId + '" target="_blank"></a>';
                html += '  </div>';
                html += '  <div class="video-label">';
                html += '    <span class="video-index">' + (index + 1) + '</span>';
                html += '    <span class="video-title" id="' + labelId + '">';
                html += v.title;
                html += '      <small>▶</small>';
                html += '    </span>';
                html += '  </div>';
                html += '</div>';
            });

            grid.innerHTML = html;

            // =========================================================
            // إعداد بيانات اللاعبين
            // =========================================================
            var players = [];
            var bannerData = [];

            videos.forEach(function(v, index) {
                var btn = document.getElementById('btnClick-' + index);
                var cont = document.getElementById('cont-' + index);
                var label = document.getElementById('label-' + index);

                bannerData[index] = {
                    videoId: v.id,
                    url: v.url,
                    title: v.title,
                    btn: btn,
                    cont: cont,
                    label: label,
                    playerReady: false,
                    player: null,
                    isPlaying: false
                };
            });

            // =========================================================
            // YouTube IFrame API
            // =========================================================
            window.onYouTubeIframeAPIReady = function() {

                bannerData.forEach(function(data, idx) {
                    var playerId = 'player-' + idx;

                    var player = new YT.Player(playerId, {
                        width: '100%',
                        height: '100%',
                        videoId: data.videoId,
                        playerVars: {
                            controls: 0,
                            disablekb: 1,
                            loop: 1,
                            modestbranding: 1,
                            showinfo: 0,
                            fs: 0,
                            cc_load_policy: 0,
                            iv_load_policy: 3,
                            playsinline: 1,
                            rel: 0,
                            playlist: data.videoId,
                            origin: window.location.origin
                        },
                        events: {
                            onReady: function(event) {
                                event.target.mute();
                                event.target.playVideo();
                                data.playerReady = true;
                                data.player = event.target;

                                var cont = document.getElementById('cont-' + idx);
                                if (cont) {
                                    var placeholder = cont.querySelector('.loading-placeholder');
                                    if (placeholder) {
                                        placeholder.style.display = 'none';
                                    }
                                }

                                if (data.label) {
                                    data.label.innerHTML = data.title + ' <small>▶ يعمل</small>';
                                }
                            },
                            onStateChange: function(event) {
                                if (event.data === YT.PlayerState.PLAYING) {
                                    data.isPlaying = true;
                                    if (data.label) {
                                        var small = data.label.querySelector('small');
                                        if (small) small.textContent = '▶ يعمل';
                                    }
                                } else if (event.data === YT.PlayerState.PAUSED) {
                                    data.isPlaying = false;
                                    if (data.label) {
                                        var small = data.label.querySelector('small');
                                        if (small) small.textContent = '⏸ متوقف';
                                    }
                                } else if (event.data === YT.PlayerState.ENDED) {
                                    data.isPlaying = false;
                                    if (data.label) {
                                        var small = data.label.querySelector('small');
                                        if (small) small.textContent = '⟳ يعيد';
                                    }
                                }
                            }
                        }
                    });

                    players[idx] = player;
                    data.player = player;
                });

                // ربط أحداث النقر
                bannerData.forEach(function(data, idx) {
                    var btn = data.btn;
                    if (!btn) return;

                    btn.addEventListener('click', function(e) {
                        e.preventDefault();

                        var player = data.player;
                        if (player && data.playerReady) {
                            var state = player.getPlayerState();
                            if (state === YT.PlayerState.PLAYING) {
                                player.pauseVideo();
                            } else if (state === YT.PlayerState.PAUSED ||
                                state === YT.PlayerState.ENDED) {
                                player.playVideo();
                            } else {
                                player.playVideo();
                            }
                        }

                        window.open(data.url, '_blank');
                        return false;
                    });
                });

                console.log('✅ تم تهيئة ' + players.length + ' بانر بنجاح!');
            };

            // تحميل YouTube IFrame API
            var tag = document.createElement('script');
            tag.src = 'https://www.youtube.com/iframe_api';
            var firstScriptTag = document.getElementsByTagName('script')[0];
            firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

            var fallbackTimer = setTimeout(function() {
                var placeholders = document.querySelectorAll('.loading-placeholder');
                placeholders.forEach(function(el) {
                    if (el.style.display !== 'none') {
                        el.textContent = '⚠️ تعذر تحميل الفيديو';
                        el.style.color = '#ff6666';
                        el.style.fontSize = '13px';
                    }
                });
            }, 10000);

            var originalReady = window.onYouTubeIframeAPIReady;
            window.onYouTubeIframeAPIReady = function() {
                clearTimeout(fallbackTimer);
                if (typeof originalReady === 'function') {
                    originalReady();
                }
            };

        })();
    </script>

</body>
</html>
